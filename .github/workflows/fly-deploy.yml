# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      chatserver: ${{ steps.filter.outputs.chatserver }}
      webapp: ${{ steps.filter.outputs.webapp }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            chatserver:
              - 'chatServer/**'
              - 'src/**'
              - 'requirements.txt'
            webapp:
              - 'webApp/**'

  deploy-chatserver:
    name: Deploy chatServer
    needs: changes
    if: needs.changes.outputs.chatserver == 'true'
    runs-on: ubuntu-latest
    concurrency: deploy-chatserver
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config chatServer/fly.toml --dockerfile chatServer/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-webapp:
    name: Deploy webApp
    needs: changes
    if: needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    concurrency: deploy-webapp
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: >-
          flyctl deploy --remote-only
          --config webApp/fly.toml
          --dockerfile webApp/Dockerfile
          --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    name: Post-deploy smoke test
    needs: [deploy-chatserver, deploy-webapp]
    if: always() && (needs.deploy-chatserver.result == 'success' || needs.deploy-webapp.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test chatserver
        if: needs.deploy-chatserver.result == 'success'
        run: curl --retry 5 --retry-delay 10 -sf https://clarity-chatserver.fly.dev/health

      - name: Smoke test webapp
        if: needs.deploy-webapp.result == 'success'
        run: curl --retry 5 --retry-delay 10 -sf https://clarity-webapp.fly.dev/

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: failure()

      - name: Rollback chatserver on failure
        if: failure() && needs.deploy-chatserver.result == 'success'
        run: flyctl releases rollback -a clarity-chatserver
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Rollback webapp on failure
        if: failure() && needs.deploy-webapp.result == 'success'
        run: flyctl releases rollback -a clarity-webapp
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
